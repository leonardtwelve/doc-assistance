name: 'Rapport de bug'
description: 'Signaler un problème ou un comportement inattendu'
title: '[BUG] '
labels: ['bug', 'status:triage']
body:
  - type: textarea
    id: description
    attributes:
      label: 'Description du problème'
      description: 'Décrivez clairement le bug rencontré.'
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 'Étapes pour reproduire'
      value: |
        1. Aller sur '...'
        2. Cliquer sur '...'
        3. Observer '...'
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 'Comportement attendu'
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 'Comportement observé'
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: 'Sévérité estimée'
      options:
        - Critique (bloquant)
        - Haute
        - Moyenne
        - Basse
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: "Contexte / Captures d'écran"
